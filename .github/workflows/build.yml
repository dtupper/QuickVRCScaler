name: Build

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  test:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run unit tests
        run: python -W error::ResourceWarning -m unittest discover -s tests -v

  build:
    needs: test
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Build single-file EXE
        run: >
          pyinstaller
          --onefile
          --windowed
          --name QuickVRCScaler
          --collect-all zeroconf
          --collect-all tinyoscquery
          quickvrcscaler.py

      - name: Smoke-test the binary
        shell: pwsh
        run: |
          if (-not (Test-Path dist/QuickVRCScaler.exe)) {
            throw "dist/QuickVRCScaler.exe was not produced"
          }
          $size = (Get-Item dist/QuickVRCScaler.exe).Length
          Write-Host "Built EXE: $size bytes"

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: QuickVRCScaler-windows
          path: dist/QuickVRCScaler.exe
          if-no-files-found: error

      - name: Attach EXE to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/QuickVRCScaler.exe
          generate_release_notes: true
